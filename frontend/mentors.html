<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Mentors — AlumniConnect</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        h1, h2, h3, .font-display {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body class="h-full flex flex-col">
    <!-- Navbar Container -->
    <header id="navbar-container" class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm"></header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
        <div class="md:flex md:items-center md:justify-between mb-8">
            <div class="flex-1 min-w-0">
                <h1 class="text-3xl font-bold leading-7 text-slate-900 sm:text-4xl sm:truncate">
                    Connect with Alumni Mentors
                </h1>
                <p class="mt-2 text-sm text-slate-600">
                    Find verified alumni profiles, filter by industry, experience and skills.
                </p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Sidebar Filters -->
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-fit space-y-6">
                <h2 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-3">Filters</h2>
                
                <!-- Search bar -->
                <div>
                    <label for="search-input" class="block text-sm font-medium text-slate-700 mb-1">Search Keywords</label>
                    <input type="text" id="search-input" placeholder="Name, bio, skills..." class="w-full px-3 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-slate-900">
                </div>

                <!-- Domain Filter -->
                <div>
                    <label for="domain-select" class="block text-sm font-medium text-slate-700 mb-1">Industry / Domain</label>
                    <select id="domain-select" class="w-full px-3 py-2.5 border border-slate-300 rounded-xl text-sm bg-white focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-slate-900">
                        <option value="">All Domains</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Finance">Finance</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Management">Management</option>
                    </select>
                </div>

                <!-- Experience Filter -->
                <div>
                    <label for="exp-input" class="block text-sm font-medium text-slate-700 mb-1">Min Experience (Years)</label>
                    <input type="number" id="exp-input" min="0" placeholder="e.g. 3" class="w-full px-3 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-slate-900">
                </div>

                <!-- Clear button -->
                <button id="clear-filters-btn" class="w-full py-2 px-4 border border-slate-300 rounded-xl text-sm font-medium text-slate-700 hover:bg-slate-50 transition">
                    Clear Filters
                </button>
            </div>

            <!-- Mentor Grid & Pagination -->
            <div class="lg:col-span-3 space-y-8">
                <!-- Skeletons / Loader -->
                <div id="mentor-loader" class="grid sm:grid-cols-2 gap-6 hidden">
                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm animate-pulse space-y-4">
                        <div class="flex gap-4">
                            <div class="w-12 h-12 rounded-xl bg-slate-200"></div>
                            <div class="flex-grow space-y-2">
                                <div class="h-4 bg-slate-200 rounded w-1/2"></div>
                                <div class="h-3 bg-slate-200 rounded w-3/4"></div>
                            </div>
                        </div>
                        <div class="h-16 bg-slate-200 rounded"></div>
                        <div class="h-6 bg-slate-200 rounded w-1/3"></div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm animate-pulse space-y-4">
                        <div class="flex gap-4">
                            <div class="w-12 h-12 rounded-xl bg-slate-200"></div>
                            <div class="flex-grow space-y-2">
                                <div class="h-4 bg-slate-200 rounded w-1/2"></div>
                                <div class="h-3 bg-slate-200 rounded w-3/4"></div>
                            </div>
                        </div>
                        <div class="h-16 bg-slate-200 rounded"></div>
                        <div class="h-6 bg-slate-200 rounded w-1/3"></div>
                    </div>
                </div>

                <!-- Empty State -->
                <div id="no-mentors-view" class="bg-white border border-slate-200 p-12 rounded-2xl text-center hidden">
                    <span class="text-4xl block mb-3">🔍</span>
                    <h3 class="text-lg font-bold text-slate-900">No mentors found</h3>
                    <p class="text-slate-500 mt-1">Try adjusting your filters or search keywords.</p>
                </div>

                <!-- Card container -->
                <div id="mentor-cards-container" class="grid sm:grid-cols-2 gap-6"></div>

                <!-- Pagination -->
                <div id="pagination-controls" class="flex justify-between items-center border-t border-slate-200 pt-6">
                    <button id="prev-page-btn" disabled class="px-4 py-2 border border-slate-300 rounded-xl text-sm font-medium text-slate-700 bg-white hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition">
                        Previous
                    </button>
                    <span id="page-info" class="text-sm text-slate-600 font-medium">Page 1 of 1</span>
                    <button id="next-page-btn" disabled class="px-4 py-2 border border-slate-300 rounded-xl text-sm font-medium text-slate-700 bg-white hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition">
                        Next
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-12 border-t border-slate-800">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent">
                AlumniConnect
            </div>
            <p class="text-sm">
                &copy; 2026 AlumniConnect. All rights reserved.
            </p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/mentors.js"></script>
</body>
</html>
