<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Profile — AlumniConnect</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        h1, h2, h3, .font-display {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body class="h-full flex flex-col">
    <!-- Navbar Container -->
    <header id="navbar-container" class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm"></header>

    <!-- Main Content -->
    <main class="flex-grow max-w-4xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
        <!-- Back Link -->
        <a href="mentors.html" class="inline-flex items-center gap-1.5 text-sm font-semibold text-slate-500 hover:text-indigo-600 transition mb-6">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Mentors list
        </a>

        <!-- Main card -->
        <div id="mentor-profile-card" class="bg-white border border-slate-200 shadow-sm rounded-2xl p-6 sm:p-8 space-y-6 hidden">
            <div class="flex flex-col sm:flex-row justify-between items-start gap-4 pb-6 border-b border-slate-100">
                <div class="flex items-center gap-4">
                    <div id="profile-avatar" class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-indigo-500 to-violet-500 flex items-center justify-center font-bold text-white text-2xl shadow-inner">
                        <!-- Loaded dynamically -->
                    </div>
                    <div>
                        <h1 id="profile-name" class="text-2xl font-bold text-slate-900"><!-- Loaded dynamically --></h1>
                        <p id="profile-domain" class="text-sm font-medium text-indigo-600 mt-0.5"><!-- Loaded dynamically --></p>
                    </div>
                </div>
                <div class="flex flex-col sm:items-end gap-1.5">
                    <span id="profile-exp" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold bg-indigo-50 text-indigo-700 border border-indigo-100">
                        <!-- Loaded dynamically -->
                    </span>
                    <span id="profile-avail-badge" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-700 border border-emerald-100">
                        Available
                    </span>
                </div>
            </div>

            <!-- Profile Info Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- Left panel (Bio & Tags) -->
                <div class="md:col-span-2 space-y-6">
                    <div>
                        <h2 class="text-lg font-bold text-slate-900 mb-2">About Me</h2>
                        <p id="profile-bio" class="text-slate-600 text-sm leading-relaxed font-light whitespace-pre-line">
                            <!-- Loaded dynamically -->
                        </p>
                    </div>
                    
                    <div>
                        <h2 class="text-lg font-bold text-slate-900 mb-3">Skills & Focus Areas</h2>
                        <div id="profile-tags" class="flex flex-wrap gap-2">
                            <!-- Loaded dynamically -->
                        </div>
                    </div>
                </div>

                <!-- Right panel (Availability & Booking Action) -->
                <div class="md:col-span-1 bg-slate-50 border border-slate-200 rounded-xl p-5 space-y-4 h-fit">
                    <div>
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Availability</h3>
                        <p id="profile-avail-text" class="text-slate-700 text-sm font-semibold mt-1">
                            <!-- Loaded dynamically -->
                        </p>
                    </div>

                    <div class="border-t border-slate-200 pt-4" id="booking-action-section">
                        <!-- Loaded dynamically based on auth status -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Detail loader skeleton -->
        <div id="detail-loader" class="bg-white border border-slate-200 shadow-sm rounded-2xl p-6 sm:p-8 space-y-6 animate-pulse">
            <div class="flex gap-4 border-b border-slate-100 pb-6">
                <div class="w-16 h-16 rounded-2xl bg-slate-200"></div>
                <div class="flex-grow space-y-2">
                    <div class="h-6 bg-slate-200 rounded w-1/3"></div>
                    <div class="h-4 bg-slate-200 rounded w-1/4"></div>
                </div>
            </div>
            <div class="space-y-3">
                <div class="h-4 bg-slate-200 rounded"></div>
                <div class="h-4 bg-slate-200 rounded"></div>
                <div class="h-4 bg-slate-200 rounded w-5/6"></div>
            </div>
        </div>
    </main>

    <!-- Booking Modal -->
    <div id="booking-modal" class="fixed inset-0 z-50 overflow-y-auto hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <!-- Modal Background overlay -->
            <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" aria-hidden="true"></div>

            <!-- Trick to center modal content in browser -->
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

            <!-- Modal Content -->
            <div class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full border border-slate-100">
                <form id="booking-form">
                    <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4 space-y-4">
                        <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                            <h3 class="text-lg font-bold text-slate-900" id="modal-title">
                                Book Mentorship Session
                            </h3>
                            <button type="button" id="close-modal-btn" class="text-slate-400 hover:text-slate-500 focus:outline-none">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                        
                        <!-- Inputs -->
                        <div>
                            <label for="booking-topic" class="block text-sm font-medium text-slate-700">Session Topic</label>
                            <input type="text" id="booking-topic" required class="w-full px-3 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-slate-900 mt-1" placeholder="e.g. Mock Technical Interview">
                        </div>

                        <div>
                            <label for="booking-datetime" class="block text-sm font-medium text-slate-700">Preferred Date & Time</label>
                            <input type="datetime-local" id="booking-datetime" required class="w-full px-3 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-slate-900 mt-1">
                        </div>

                        <div>
                            <label for="booking-message" class="block text-sm font-medium text-slate-700">Message for Mentor (Optional)</label>
                            <textarea id="booking-message" rows="4" class="w-full px-3 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-slate-900 mt-1" placeholder="Describe your background and what you hope to get out of the session..."></textarea>
                        </div>
                    </div>
                    
                    <div class="bg-slate-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse gap-3">
                        <button type="submit" class="w-full inline-flex justify-center rounded-xl border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-semibold text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:w-auto sm:text-sm">
                            Submit Request
                        </button>
                        <button type="button" id="cancel-booking-btn" class="mt-3 w-full inline-flex justify-center rounded-xl border border-slate-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-slate-700 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:w-auto sm:text-sm">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-12 border-t border-slate-800">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent">
                AlumniConnect
            </div>
            <p class="text-sm">
                &copy; 2026 AlumniConnect. All rights reserved.
            </p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/mentor-detail.js"></script>
</body>
</html>
