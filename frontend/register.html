<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — AlumniConnect</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        h1, h2, h3, .font-display {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body class="h-full flex flex-col">
    <!-- Navbar Container -->
    <header id="navbar-container" class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm"></header>

    <!-- Content -->
    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">
            <div>
                <h2 class="text-center text-3xl font-extrabold text-slate-900">
                    Create Account
                </h2>
                <p class="mt-2 text-center text-sm text-slate-600">
                    Join our vibrant mentorship community
                </p>
            </div>
            
            <form class="mt-8 space-y-4" id="register-form">
                <div>
                    <label for="full-name" class="block text-sm font-medium text-slate-700">Full Name</label>
                    <input id="full-name" name="full-name" type="text" required class="appearance-none rounded-xl relative block w-full px-3 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm mt-1" placeholder="Jane Doe">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700">Email Address</label>
                    <input id="email" name="email" type="email" required class="appearance-none rounded-xl relative block w-full px-3 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm mt-1" placeholder="you@example.com">
                </div>
                <div>
                    <label for="role" class="block text-sm font-medium text-slate-700">Account Type</label>
                    <select id="role" name="role" required class="block w-full px-3 py-3 border border-slate-300 bg-white rounded-xl shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm mt-1 text-slate-900">
                        <option value="student">Student (Seeking Mentorship)</option>
                        <option value="alumni">Alumni (Willing to Mentor)</option>
                        <option value="admin">Admin (Platform Moderator)</option>
                    </select>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                    <input id="password" name="password" type="password" required class="appearance-none rounded-xl relative block w-full px-3 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm mt-1" placeholder="Min. 6 characters">
                </div>
                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-slate-700">Confirm Password</label>
                    <input id="confirm-password" name="confirm-password" type="password" required class="appearance-none rounded-xl relative block w-full px-3 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm mt-1" placeholder="••••••••">
                </div>

                <div class="pt-2">
                    <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-xl text-white bg-indigo-600 hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 shadow-lg shadow-indigo-600/20 transition-all">
                        Register
                    </button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="text-sm text-slate-600">
                    Already have an account? 
                    <a href="login.html" class="font-semibold text-indigo-600 hover:text-indigo-500">Sign In here</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
