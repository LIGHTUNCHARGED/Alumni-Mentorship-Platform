<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — AlumniConnect</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        h1, h2, h3, .font-display {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body class="h-full flex flex-col">
    <!-- Navbar Container -->
    <header id="navbar-container" class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm"></header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
        <!-- Dashboard Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-slate-900" id="dash-welcome">
                Welcome to your Dashboard
            </h1>
            <p class="text-sm text-slate-600 mt-1" id="dash-role-subtitle">
                Manage your profile, booking sessions, and forum activity.
            </p>
        </div>

        <!-- Dashboard Loader -->
        <div id="dash-loader" class="space-y-6 animate-pulse">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-4">
                    <div class="bg-white p-6 rounded-2xl border border-slate-200 h-64"></div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 h-64"></div>
            </div>
        </div>

        <!-- Student View Section -->
        <div id="student-view" class="grid grid-cols-1 lg:grid-cols-3 gap-8 hidden">
            <!-- Bookings List -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <h2 class="text-lg font-bold text-slate-900 mb-4 border-b border-slate-100 pb-3 flex items-center gap-2">
                        <span>📅</span> Requested Sessions
                    </h2>
                    
                    <div id="student-bookings-container" class="space-y-4">
                        <!-- Loaded dynamically -->
                    </div>
                </div>
            </div>

            <!-- Forum Contributions -->
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <h2 class="text-lg font-bold text-slate-900 mb-4 border-b border-slate-100 pb-3 flex items-center gap-2">
                        <span>💬</span> Forum Activity
                    </h2>
                    
                    <div class="space-y-4" id="student-forum-container">
                        <!-- Loaded dynamically -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Alumni (Mentor) View Section -->
        <div id="alumni-view" class="grid grid-cols-1 lg:grid-cols-12 gap-8 hidden">
            <!-- Left panel: Bookings & requests -->
            <div class="lg:col-span-8 space-y-6">
                <!-- Pending requests -->
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <h2 class="text-lg font-bold text-slate-900 mb-4 border-b border-slate-100 pb-3 flex items-center gap-2">
                        <span>🔔</span> Pending Session Requests
                    </h2>
                    <div id="pending-bookings-container" class="space-y-4">
                        <!-- Loaded dynamically -->
                    </div>
                </div>

                <!-- Accepted Sessions -->
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <h2 class="text-lg font-bold text-slate-900 mb-4 border-b border-slate-100 pb-3 flex items-center gap-2">
                        <span>✅</span> Approved Sessions
                    </h2>
                    <div id="accepted-bookings-container" class="space-y-4">
                        <!-- Loaded dynamically -->
                    </div>
                </div>
            </div>

            <!-- Right panel: Mentor Profile CRUD -->
            <div class="lg:col-span-4 space-y-6">
                <!-- Profile Status widget -->
                <div id="mentor-profile-widget" class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                    <h2 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-3 flex items-center gap-2">
                        <span>👤</span> Mentor Profile
                    </h2>
                    
                    <!-- Profile Display or Setup Required Banner -->
                    <div id="mentor-profile-status">
                        <!-- Loaded dynamically -->
                    </div>

                    <!-- Mentor Edit/Create Form (Collapsible / Dynamic) -->
                    <form id="mentor-profile-form" class="space-y-4 hidden">
                        <input type="hidden" id="form-action" value="create">
                        <div>
                            <label for="profile-domain" class="block text-sm font-medium text-slate-700">Domain / Industry</label>
                            <input type="text" id="form-domain" required class="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 mt-1" placeholder="e.g. Computer Science">
                        </div>
                        <div>
                            <label for="profile-exp" class="block text-sm font-medium text-slate-700">Years of Experience</label>
                            <input type="number" id="form-exp" min="0" required class="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 mt-1" placeholder="e.g. 5">
                        </div>
                        <div>
                            <label for="profile-bio" class="block text-sm font-medium text-slate-700">Bio (Max 200 words)</label>
                            <textarea id="form-bio" rows="4" required class="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 mt-1" placeholder="Talk about your background, career achievements, and how you can support students..."></textarea>
                        </div>
                        <div>
                            <label for="profile-avail" class="block text-sm font-medium text-slate-700">Weekly Availability</label>
                            <input type="text" id="form-avail" required class="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 mt-1" placeholder="e.g. Mon/Wed 6:00 PM - 8:00 PM">
                        </div>
                        <div>
                            <label for="profile-tags" class="block text-sm font-medium text-slate-700">Tags (Comma-separated)</label>
                            <input type="text" id="form-tags" class="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 mt-1" placeholder="e.g. Resume Review, React, Python">
                        </div>

                        <div class="flex gap-2">
                            <button type="submit" class="flex-grow inline-flex justify-center py-2 px-4 border border-transparent text-sm font-semibold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm focus:outline-none transition">
                                Save Profile
                            </button>
                            <button type="button" id="cancel-profile-edit" class="py-2 px-4 border border-slate-300 rounded-xl text-sm font-medium text-slate-700 hover:bg-slate-50 transition">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-12 border-t border-slate-800">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent">
                AlumniConnect
            </div>
            <p class="text-sm">
                &copy; 2026 AlumniConnect. All rights reserved.
            </p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
