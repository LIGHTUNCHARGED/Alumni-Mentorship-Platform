<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum — AlumniConnect</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        h1, h2, h3, .font-display {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body class="h-full flex flex-col">
    <!-- Navbar Container -->
    <header id="navbar-container" class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm"></header>

    <!-- Main Content -->
    <main class="flex-grow max-w-5xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
        <!-- Forum Header -->
        <div class="sm:flex sm:items-center sm:justify-between mb-8">
            <div class="flex-1 min-w-0">
                <h1 class="text-3xl font-bold leading-7 text-slate-900 sm:text-4xl sm:truncate">
                    Discussion Board
                </h1>
                <p class="mt-2 text-sm text-slate-600">
                    Ask questions, share advice, and interact with verified alumni and student peers.
                </p>
            </div>
            <div class="mt-4 sm:mt-0 sm:ml-4" id="create-post-action-container">
                <!-- Loaded dynamically based on auth status -->
            </div>
        </div>

        <!-- Search and Sort Panel -->
        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col sm:flex-row gap-4 justify-between items-center mb-8">
            <div class="w-full sm:max-w-md">
                <input type="text" id="forum-search-input" placeholder="Search discussions (keywords, users...)" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-slate-900">
            </div>
            <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                <label for="forum-sort-select" class="text-sm font-medium text-slate-600 shrink-0">Sort By:</label>
                <select id="forum-sort-select" class="px-3 py-2.5 border border-slate-300 rounded-xl text-sm bg-white focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-slate-900">
                    <option value="recent">Most Recent</option>
                    <option value="popular">Most Upvoted</option>
                </select>
            </div>
        </div>

        <!-- Posts List -->
        <div class="space-y-6">
            <!-- Skeleton Loader -->
            <div id="forum-loader" class="space-y-4 hidden">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm animate-pulse space-y-3">
                    <div class="h-4 bg-slate-200 rounded w-1/4"></div>
                    <div class="h-6 bg-slate-200 rounded w-3/4"></div>
                    <div class="h-4 bg-slate-200 rounded"></div>
                    <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm animate-pulse space-y-3">
                    <div class="h-4 bg-slate-200 rounded w-1/4"></div>
                    <div class="h-6 bg-slate-200 rounded w-3/4"></div>
                    <div class="h-4 bg-slate-200 rounded"></div>
                </div>
            </div>

            <!-- Empty State -->
            <div id="no-posts-view" class="bg-white border border-slate-200 p-12 rounded-2xl text-center hidden">
                <span class="text-4xl block mb-3">💬</span>
                <h3 class="text-lg font-bold text-slate-900">No discussions yet</h3>
                <p class="text-slate-500 mt-1">Be the first to kick off a topic!</p>
            </div>

            <!-- Posts container -->
            <div id="forum-posts-container" class="space-y-4"></div>

            <!-- Pagination -->
            <div id="forum-pagination" class="flex justify-between items-center border-t border-slate-200 pt-6">
                <button id="prev-page-btn" disabled class="px-4 py-2 border border-slate-300 rounded-xl text-sm font-medium text-slate-700 bg-white hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition">
                    Previous
                </button>
                <span id="page-info" class="text-sm text-slate-600 font-medium">Page 1</span>
                <button id="next-page-btn" disabled class="px-4 py-2 border border-slate-300 rounded-xl text-sm font-medium text-slate-700 bg-white hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition">
                    Next
                </button>
            </div>
        </div>
    </main>

    <!-- Create Post Modal -->
    <div id="create-post-modal" class="fixed inset-0 z-50 overflow-y-auto hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <!-- Overlay background -->
            <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" aria-hidden="true"></div>

            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

            <!-- Modal Panel -->
            <div class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-xl sm:w-full border border-slate-100">
                <form id="create-post-form">
                    <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4 space-y-4">
                        <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                            <h3 class="text-lg font-bold text-slate-900" id="modal-title">
                                Create New Topic
                            </h3>
                            <button type="button" id="close-post-modal-btn" class="text-slate-400 hover:text-slate-500 focus:outline-none">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                        
                        <!-- Inputs -->
                        <div>
                            <label for="post-title" class="block text-sm font-medium text-slate-700">Topic Title</label>
                            <input type="text" id="post-title" required class="w-full px-3 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-slate-900 mt-1" placeholder="Summarize your question or insight...">
                        </div>

                        <div>
                            <label for="post-body" class="block text-sm font-medium text-slate-700">Detail Explanation</label>
                            <textarea id="post-body" rows="6" required class="w-full px-3 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-slate-900 mt-1" placeholder="Provide background context, code snippets, or specific questions..."></textarea>
                        </div>
                    </div>
                    
                    <div class="bg-slate-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse gap-3">
                        <button type="submit" class="w-full inline-flex justify-center rounded-xl border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-semibold text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:w-auto sm:text-sm">
                            Publish Topic
                        </button>
                        <button type="button" id="cancel-post-btn" class="mt-3 w-full inline-flex justify-center rounded-xl border border-slate-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-slate-700 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:w-auto sm:text-sm">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-12 border-t border-slate-800">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent">
                AlumniConnect
            </div>
            <p class="text-sm">
                &copy; 2026 AlumniConnect. All rights reserved.
            </p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/forum.js"></script>
</body>
</html>
